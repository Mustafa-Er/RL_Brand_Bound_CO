name: rl_bb

channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge

dependencies:
  - python=3.10

  # Core scientific stack
  - numpy
  - scipy
  - pyyaml
  - tqdm
  - pytest

  # MILP / B&B environment
  - conda-forge::ecole
  - conda-forge::pyscipopt

  # PyTorch with CUDA 12.4 build (forward-compatible with CUDA 13.x drivers).
  # If you have no GPU, swap the pytorch-cuda line for `pytorch::cpuonly`.
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=12.4
  - nvidia::cuda-toolkit=12.4

  # PyTorch Geometric
  - pyg::pyg

  # Optional developer tools (uncomment if desired)
  # - ipython
  # - jupyterlab

  - pip
  # When pip-only deps are needed later, add:
  # - pip:
  #     - some-package==1.2.3
