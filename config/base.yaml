# Base configuration for RL-Brand-Bound CO experiments.
# All randomness flows from `experiment.seed`. `device: auto` resolves at runtime
# to "cuda" if torch.cuda.is_available() else "cpu".
# This file is a Stage 0 placeholder; later stages will populate the empty fields.

experiment:
  name: rl_bb_default
  seed: 0
  device: auto          # auto | cuda | cpu

paths:
  data_dir: data
  log_dir: logs
  ckpt_dir: checkpoints

instances:
  problem_type: set_covering   # set_covering | combinatorial_auction
  counts:
    train: 10000
    val: 2000
    test: 100
  set_covering:
    train_size:       { n_rows: 500,  n_cols: 1000 }
    transfer_medium:  { n_rows: 750,  n_cols: 1500 }
    transfer_large:   { n_rows: 1000, n_cols: 2000 }
  combinatorial_auction:
    train_size:       { n_items: 100, n_bids: 500 }
    transfer_medium:  { n_items: 150, n_bids: 750 }
    transfer_large:   { n_items: 200, n_bids: 1000 }

env:
  node_selection: dfs
  time_limit_s: 3600
  gap_limit: 0.0

expert:
  type: reliability_branching   # used for pretraining demonstrations
  fsb_for_eval: true            # FSB used as gold-standard baseline

model:
  gcnn:
    embedding_size: 64
    n_layers: 2
    activation: relu

pretrain:
  # auto           → load checkpoint if present, else train (default, friendliest)
  # force_retrain  → always retrain and overwrite
  # load_only      → require an existing checkpoint, error if missing
  mode: auto
  epochs: 2000
  lr: 1.0e-2
  batch_size: 32
  log_every: 10           # epochs between stdout log lines (history records every epoch)
  scheduler:
    patience: 50          # epochs without val-loss improvement before halving lr
    factor: 0.5
    min_lr: 5.0e-5
    threshold: 1.0e-4     # minimum val-loss drop counted as "improvement"

ppo:
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  # lr kept conservative: BC pretraining leaves the value head untrained,
  # so early PPO iterations see large value-loss gradients that can destabilize
  # the shared backbone. Lower lr + smaller value_coef tames the first few
  # iterations until V(s) catches up to typical return magnitudes.
  lr: 3.0e-5
  iterations: 50
  rollouts_per_iter: 8
  update_epochs: 4
  minibatch_size: 16
  value_coef: 0.25
  entropy_coef: 0.01

eval:
  metrics: [wall_time, node_count, dual_integral]
  seeds: [0, 1, 2, 3, 4]
